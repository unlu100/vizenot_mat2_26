
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://dumzxgwuzzuasdlqrytw.supabase.co', 'sb_publishable_rout-nyMOoH7Sm5YLzLhOA_2N9iHgdp')

<label for="ogr_no1">Öğrenci No:</label>
<input type="text" id="ogr_no"><br>

<label for="ad">Ad:</label>
<input type="text" id="ad"><br>

<label for="soyad">Soyad:</label>
<input type="text" id="soyad"><br>

<button onclick="notSorgula()">Sorgula</button>

<div id="sonuc"></div>

<script>
async function notSorgula() {
    const ogrNo = document.getElementById("ogr_no1").value;
    const ad = document.getElementById("ad").value;
    const soyad = document.getElementById("soyad").value;
    const sonucDiv = document.getElementById("sonuc");

    if (!ogrNo || !ad || !soyad) {
        sonucDiv.innerHTML = "Lütfen tüm bilgileri girin.";
        return;
    }

    try {
        const response = await fetch(`/not_sorgu?ogr_no=${ogrNo}&ad=${ad}&soyad=${soyad}`);
        const data = await response.json();

        if (data.hata) {
            sonucDiv.innerHTML = "Hata: " + data.hata;
        } else {
            sonucDiv.innerHTML = `
                Öğrenci No: ${data.ogr_no1}<br>
                Ad: ${data.ad}<br>
                Soyad: ${data.soyad}<br>
                Doğru: ${data.dogru}<br>
                Yanlış: ${data.yanlis}<br>
                Not: ${data.not}
            `;
        }
    } catch (error) {
        sonucDiv.innerHTML = "Sunucuya bağlanırken hata oluştu.";
    }
}
</script>

<input id="ogr_no1" placeholder="Öğrenci No">
<input id="ad_soyad" placeholder="AD SOYAD">
<button onclick="notSorgula()">Sorgula</button>
<pre id="sonuc"></pre>
