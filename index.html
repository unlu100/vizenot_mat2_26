<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not Sorgulama</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      padding:40px;
    }

    .container{
      max-width:500px;
      margin:auto;
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      margin-bottom:15px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      background:#0077cc;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#005fa3;
    }

    .result{
      margin-top:20px;
      padding:15px;
      background:#eef;
      border-radius:5px;
    }

    .error{
      color:red;
      margin-top:15px;
    }
  </style>
</head>
<body>

<div class="container">

  <h2>Öğrenci Not Sorgulama</h2>

  <input type="text" id="ogrNo" placeholder="Öğrenci No">
  
  <input type="text" id="adSoyad" placeholder="AD SOYAD">

  <button onclick="sorgula()">
    Sorgula
  </button>

  <div id="sonuc"></div>

</div>

<script>

  // BURAYI DEĞİŞTİR
  // const supabaseUrl = 'https://PROJE_ID.supabase.co';
  const supabaseUrl = "https://dumzxgwuzzuasdlqrytw.supabase.co";

  // BURAYI DEĞİŞTİR
  // const supabaseKey = 'ANON_PUBLIC_KEY';
  const supabaseKey = 'sb_publishable_rout-nyMOoH7Sm5YLzLhOA_2N9iHgdp';

  const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

  async function sorgula(){

    const ogrNo = document
      .getElementById("ogrNo")
      .value
      .trim();

    const adSoyad = document
      .getElementById("adSoyad")
      .value
      .trim();

    const sonucDiv = document.getElementById("sonuc");

    sonucDiv.innerHTML = "Sorgulanıyor...";

    const { data, error } = await supabaseClient
      .from('vize_mat2not')
      .select('*')
      .eq('ogr_no1', ogrNo)
      .ilike('ad_soyad', adSoyad)
      .limit(1);

    if(error){
      sonucDiv.innerHTML =
        `<div class="error">
          Hata oluştu.
        </div>`;

      console.log(error);
      return;
    }

    if(data.length === 0){

      sonucDiv.innerHTML =
        `<div class="error">
          Kayıt bulunamadı.
        </div>`;

      return;
    }

    const ogr = data[0];

    sonucDiv.innerHTML = `
      <div class="result">

        <h3>Sonuç</h3>

        <p><strong>Öğrenci No:</strong> ${ogr.ogr_no1}</p>

        <p><strong>Ad Soyad:</strong> ${ogr.ad_soyad}</p>

        <p><strong>Puan:</strong> ${ogr.puan}</p>

        <p><strong>Doğru Sayısı:</strong> ${ogr.dogru_sayi}</p>

        <p><strong>Yanlış Sayısı:</strong> ${ogr.yanlis_sayi}</p>

        <p><strong>Kitapçık:</strong> ${ogr.kitapcik}</p>

        <p><strong>Konu1 Cev:</strong> ${ogr.Konu1cev}</p>

        <p><strong>Doğrular1:</strong> ${ogr.dogrular1}</p>

        <p><strong>Yanlışlar:</strong> ${ogr.yanlislar}</p>

      </div>
    `;
  }

</script>

</body>
</html>
