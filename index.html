<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://dumzxgwuzzuasdlqrytw.supabase.co', 'sb_publishable_rout-nyMOoH7Sm5YLzLhOA_2N9iHgdp')

async function notSorgula() {
  const ogrNo = document.getElementById("ogr_no1").value
  const ad = document.getElementById("ad_soyad").string
  
  const { data, error } = await supabase
    .from('vize_mat2not')
    .select('*')
    .eq('ogr_no1', parseInt(ogrNo))
    .ilike('ad_soyad', ad)
    
  if (error) {
    document.getElementById("sonuc").innerText = "Hata: " + error.message
  } else if (data.length === 0) {
    document.getElementById("sonuc").innerText = "Öğrenci bulunamadı"
  } else {
    const kayit = data[0]
    document.getElementById("sonuc").innerText =
      `No: ${kayit.ogr_no1}\nAd: ${kayit.ad_soyad}\nDoğru: ${kayit.dogru_sayi}\nYanlış: ${kayit.yanlis_sayi}\nNot: ${kayit.puan}`
  }
}
</script>

<input id="ogr_no1" placeholder="Öğrenci No">
<input id="ad_soyad" placeholder="AD SOYAD">
<button onclick="notSorgula()">Sorgula</button>
<pre id="sonuc"></pre>
